name: Run WhatsApp Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run bot
        run: node index.js
